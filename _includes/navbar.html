<nav class="navbar is-fixed-top" role="navigation" aria-label="main navigation">
  <div class="container">
    <div class="navbar-brand">
      <a class="navbar-item" href="{{ '/' | relative_url }}">
        <img src="{{ site.logo | relative_url }}" alt="{{ site.title }}" height="40">
      </a>
      <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="mainNavbar">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </a>
    </div>
    <div id="mainNavbar" class="navbar-menu">
      <div class="navbar-end">
        {% for link in site.nav_links %}
        <a class="navbar-item{% if page.url == link.url %} is-active{% endif %}" href="{{ link.url | relative_url }}">
          {{ link.title }}
        </a>
        {% endfor %}
        <a class="navbar-item{% if page.url == '/search/' %} is-active{% endif %}" href="{{ '/search/' | relative_url }}" aria-label="Search">
          <span class="icon"><i class="fas fa-search"></i></span>
        </a>
      </div>
    </div>
  </div>
</nav>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const burger = document.querySelector('.navbar-burger');
  const menu = document.getElementById(burger.dataset.target);
  burger.addEventListener('click', () => {
    burger.classList.toggle('is-active');
    menu.classList.toggle('is-active');
  });
});
</script>
