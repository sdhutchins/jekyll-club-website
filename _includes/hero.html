<section class="hero page-hero is-medium">
  <div class="hero-body">
    <div class="container has-text-centered">
      {% if page.title %}
      <h1 class="title is-2 has-text-white">{{ page.title }}</h1>
      {% endif %}
      {% if page.subtitle %}
      <p class="subtitle is-5 has-text-white">{{ page.subtitle }}</p>
      {% endif %}
    </div>
  </div>
</section>
