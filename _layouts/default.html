<!doctype html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body class="site-body">
  <a href="#main-content" class="skip-link">Skip to content</a>
  {% include navbar.html %}

  <main id="main-content" class="site-content">
    {{ content }}
  </main>

  <button id="back-to-top" class="back-to-top" aria-label="Back to top">
    <span class="icon"><i class="fas fa-chevron-up"></i></span>
  </button>

  {% include footer.html %}
<script>
document.querySelectorAll('main img:not([loading])').forEach(function(img){img.loading='lazy';});

(function(){
  var btn = document.getElementById('back-to-top');
  window.addEventListener('scroll', function(){
    btn.classList.toggle('is-visible', window.scrollY > 400);
  });
  btn.addEventListener('click', function(){
    window.scrollTo({top:0, behavior:'smooth'});
  });
})();

(function(){
  var seenHeadingIds = {};

  function slugifyHeading(text) {
    return text
      .toLowerCase()
      .trim()
      .replace(/[^a-z0-9\s-]/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-');
  }

  function uniqueHeadingId(baseId) {
    var normalizedId = baseId || 'section';
    var duplicateCount = seenHeadingIds[normalizedId] || 0;

    seenHeadingIds[normalizedId] = duplicateCount + 1;

    if (duplicateCount === 0) {
      return normalizedId;
    }

    return normalizedId + '-' + (duplicateCount + 1);
  }

  // Add stable, visible anchor links so page subheadings can be deep-linked.
  document.querySelectorAll('main .content h2, main .content h3, main .content h4').forEach(function(heading) {
    heading.id = uniqueHeadingId(heading.id || slugifyHeading(heading.textContent));

    if (heading.querySelector('.heading-anchor-link')) return;

    var anchorLink = document.createElement('a');
    anchorLink.className = 'heading-anchor-link';
    anchorLink.href = '#' + heading.id;
    anchorLink.setAttribute('aria-label', 'Link to section: ' + heading.textContent.trim());
    anchorLink.innerHTML = '<span aria-hidden="true">#</span>';
    heading.appendChild(anchorLink);
  });
})();

(function(){
  var els = document.querySelectorAll('.reveal');
  if (!els.length) return;
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if (e.isIntersecting) {
        e.target.classList.add('is-visible');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  els.forEach(function(el){ io.observe(el); });
})();
</script>
</body>
</html>
